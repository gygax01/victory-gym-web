<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes</title>
  <link rel="stylesheet" href="css/styles.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
  @media (max-width: 768px){
    .header-brand{
      flex-direction: column;
      gap: 14px;
      padding: 18px;
      text-align:center;
    }

    .brand{
      flex-direction: column;
      gap: 8px;
    }

    .brand img{
      height: 70px;
    }

    .brand h2{
      font-size: 20px;
    }

    header button{
      width: 100%;
      margin-left: 0;
    }

    .search-bar{
      width: 92%;
    }

    .search-bar input{
      height: 46px;
      font-size: 15px;
    }

    .historial-container{
      width: 94%;
    }

    .cliente{
      padding: 16px;
    }

    .cliente-header{
      align-items: center;
    }

    .cliente h3{
      font-size: 20px;
    }

    .acciones{
      width: 100%;
      display: grid;
      gap: 10px;
    }

    .acciones button{
      width: 100%;
      font-size: 15px;
      padding: 14px;
    }

    .confirmacion .box{
      width: 92%;
      padding: 36px 20px;
    }

    .confirmacion h1{
      font-size: 28px;
    }

    .confirmacion p{
      font-size: 16px;
    }

    .confirmacion button{
      width: 100%;
      margin-top: 10px;
    }

    .reasign-pago-grid{
      grid-template-columns: 1fr;
    }
  }
  </style>

  <style>
  .edit-form{
    display:grid;
    gap:10px;
    margin-top: 12px;
  }

  .edit-form input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,.1);
    background:#2c2e33;
    color:#fff;
  }

  .cliente-panel{
    padding-top: 12px;
  }

  .cliente-panel .acciones{
    display:grid;
    grid-template-columns: 1fr;
    gap:10px;
    margin-top: 0;
    padding-top: 14px;
    border-top: 1px solid rgba(243,114,44,.25);
  }

  .cliente-panel .acciones button{
    margin:0;
    background:#3f4147;
  }

  .cliente-panel .acciones button:hover{
    background:#4a4d55;
  }

  .reasign-precio{
    margin: 0 0 10px;
    color: #d8ffe7;
    border: 1px solid rgba(46, 204, 113, .35);
    background: rgba(46, 204, 113, .12);
    border-radius: 10px;
    padding: 10px 12px;
    font-weight: 700;
  }

  .reasign-precio strong{
    color: #2ecc71;
    font-size: 24px;
    margin-left: 6px;
  }

  .reasign-pago-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin: 8px 0;
  }

  .reasign-pago-grid input{
    margin:0;
    text-align:center;
    font-weight:600;
  }

  .reasign-cambio{
    margin:0;
    min-height:46px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    border:1px solid rgba(255,255,255,.12);
    background:#2f3238;
    color:#d5d9df;
    font-weight:700;
    font-size:18px;
  }

  .reasign-btn-confirmar{
    background:#2ecc71;
    color:#fff;
    font-weight:700;
  }

  .reasign-btn-confirmar:disabled{
    opacity:.55;
    cursor:not-allowed;
    transform:none;
  }
  </style>
</head>

<body>

<header class="header-brand">
  <div class="brand">
    <img src="img/logo.png">
    <h2>Clientes</h2>
  </div>
  <button onclick="location.href='index.html'">← Inicio</button>
</header>

<div class="search-bar">
  <input id="busqueda" placeholder="Buscar cliente...">
</div>

<div class="historial-container" id="listaClientes"></div>

<div class="confirmacion error" id="confirmBorrar">
  <div class="box">
    <h1>Eliminar cliente</h1>
    <p>Esta acción no se puede revertir</p>
    <button id="btnConfirmarBorrado">Confirmar</button>
    <button id="btnCancelarBorrado">Cancelar</button>
  </div>
</div>

<div class="confirmacion" id="confirmReasignar">
  <div class="box">
    <h1>Reasignar tarjeta</h1>
    <p class="reasign-precio">
      Reposición / reasignación: <strong id="montoReasignacion">$50.00</strong>
    </p>

    <div class="reasign-pago-grid">
      <input
        id="pagoReasignacion"
        type="number"
        min="0"
        step="0.01"
        inputmode="decimal"
        placeholder="Pago con"
      >
      <p id="cambioReasignacionTexto" class="reasign-cambio">Cambio: $0.00</p>
    </div>

    <button id="btnConfirmarPagoReasignacion" class="reasign-btn-confirmar">
      Confirmar pago
    </button>

    <p id="txtPasoReasignacion">Confirma el pago para iniciar lectura de tarjeta.</p>
    <div id="estadoTarjeta" class="estado amarillo">Pago pendiente</div>

    <button id="btnCancelarReasignar">Cancelar</button>
  </div>
</div>

<div class="confirmacion" id="confirmEditar">
  <div class="box">
    <h1>Editar cliente</h1>
    <p>Actualiza los datos y guarda cambios</p>
    <div class="edit-form">
      <input id="editNombre" placeholder="Nombre completo">
      <input id="editTelefono" placeholder="Teléfono">
      <input id="editPeso" type="number" step="0.1" placeholder="Peso (kg)">
      <input id="editAltura" type="number" step="0.01" placeholder="Altura (m)">
    </div>
    <button id="btnGuardarEdicion">Guardar</button>
    <button id="btnCancelarEdicion">Cancelar</button>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/config.js"></script>
<script src="js/ui.js"></script>
<script src="js/ingresos.js"></script>
<script src="js/nfc.js"></script>
<script src="js/realtime.js"></script>

<script>
function obtenerClientes() {
  return safeGet("clientes");
}

function valorCliente(c, key, fallback = 0) {
  const map = {
    telefono: ["telefono", "phone"],
    peso: ["peso", "weight"],
    altura: ["altura", "height"]
  };

  const keys = map[key] || [key];
  for (const k of keys) {
    if (c[k] !== undefined && c[k] !== null && c[k] !== "") return c[k];
  }

  return fallback;
}

function normalizarTexto(texto) {
  return String(texto ?? "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase();
}

function escapeHTML(valor) {
  return String(valor ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function fmtMoney(valor) {
  return `$${(Number(valor) || 0).toFixed(2)}`;
}

function stockTarjetasDisponibles() {
  if (typeof obtenerStockTarjetas !== "function") return 0;
  return Number(obtenerStockTarjetas()?.cantidad || 0);
}

const COSTO_REASIGNACION_TARJETA =
  typeof getPrecioReasignacionTarjeta === "function" ? getPrecioReasignacionTarjeta() : 50;

const listaClientes = document.getElementById("listaClientes");
const busqueda = document.getElementById("busqueda");
const confirmBorrar = document.getElementById("confirmBorrar");
const confirmReasignar = document.getElementById("confirmReasignar");
const confirmEditar = document.getElementById("confirmEditar");
const estadoTarjeta = document.getElementById("estadoTarjeta");
const montoReasignacion = document.getElementById("montoReasignacion");
const pagoReasignacion = document.getElementById("pagoReasignacion");
const cambioReasignacionTexto = document.getElementById("cambioReasignacionTexto");
const btnConfirmarPagoReasignacion = document.getElementById("btnConfirmarPagoReasignacion");
const txtPasoReasignacion = document.getElementById("txtPasoReasignacion");

const btnConfirmarBorrado = document.getElementById("btnConfirmarBorrado");
const btnCancelarBorrado = document.getElementById("btnCancelarBorrado");
const btnCancelarReasignar = document.getElementById("btnCancelarReasignar");
const btnGuardarEdicion = document.getElementById("btnGuardarEdicion");
const btnCancelarEdicion = document.getElementById("btnCancelarEdicion");

const editNombre = document.getElementById("editNombre");
const editTelefono = document.getElementById("editTelefono");
const editPeso = document.getElementById("editPeso");
const editAltura = document.getElementById("editAltura");

let clientes = [];
let clienteIdEliminar = null;
let clienteIdReasignar = null;
let clienteIdEditar = null;
let leyendoTarjeta = false;
let pagoReasignacionConfirmado = false;
let pagoRecibidoReasignacion = 0;
let cambioReasignacion = 0;

window.addEventListener("load", () => {
  if (montoReasignacion) {
    montoReasignacion.textContent = fmtMoney(COSTO_REASIGNACION_TARJETA);
  }

  busqueda.oninput = filtrar;
  btnConfirmarBorrado.onclick = confirmarBorrado;
  btnCancelarBorrado.onclick = cancelarBorrado;
  btnCancelarReasignar.onclick = cancelarReasignacion;
  btnGuardarEdicion.onclick = guardarEdicionCliente;
  btnCancelarEdicion.onclick = cancelarEdicionCliente;

  if (pagoReasignacion) {
    pagoReasignacion.addEventListener("input", recalcularPagoReasignacion);
  }
  if (btnConfirmarPagoReasignacion) {
    btnConfirmarPagoReasignacion.addEventListener("click", confirmarPagoReasignacion);
  }

  iniciarSyncClientes();
  cargarClientes();
});

function iniciarSyncClientes() {
  const bc = new BroadcastChannel("victory-data");

  bc.onmessage = e => {
    if (e.data === "clientes") cargarClientes();
  };

  window.addEventListener("storage", e => {
    if (e.key === "clientes") cargarClientes();
  });
}

function cargarClientes() {
  clientes = obtenerClientes()
    .filter(c => c && typeof c.nombre === "string")
    .sort((a, b) =>
      a.nombre.localeCompare(b.nombre, "es", { sensitivity: "base" })
    );

  filtrar();
}

function render(lista) {
  listaClientes.innerHTML = "";

  if (!lista.length) {
    listaClientes.innerHTML = "<p>No hay clientes registrados</p>";
    return;
  }

  lista.forEach(c => {
    const cont = document.createElement("div");
    cont.className = "cliente";

    const nombre = escapeHTML(c.nombre);
    const telefono = escapeHTML(valorCliente(c, "telefono", "0"));
    const peso = escapeHTML(valorCliente(c, "peso", 0));
    const altura = escapeHTML(valorCliente(c, "altura", 0));

    cont.innerHTML = `
      <div class="cliente-header" aria-expanded="false">
        <div class="info-wrapper">
          <div class="info-bloque">
            <h3>${nombre}</h3>
            <p class="meta">
              <span class="racha actual">Tel: ${telefono}</span>
              &nbsp; · &nbsp;
              <span class="racha maxima">Peso: ${peso} · Altura: ${altura}</span>
            </p>
          </div>
        </div>
        <div class="flecha">&#9662;</div>
      </div>
      <div class="historial cliente-panel">
        <div class="acciones">
          <button type="button" class="accion-editar">Editar datos</button>
          <button type="button" class="accion-reasignar">Reasignar tarjeta</button>
          <button type="button" class="accion-eliminar">Eliminar</button>
        </div>
      </div>
    `;

    const header = cont.querySelector(".cliente-header");
    const panel = cont.querySelector(".historial");
    const btnEditar = cont.querySelector(".accion-editar");
    const btnReasignar = cont.querySelector(".accion-reasignar");
    const btnEliminar = cont.querySelector(".accion-eliminar");

    header.addEventListener("click", () => {
      document.querySelectorAll(".cliente.abierto").forEach(actual => {
        if (actual !== cont) {
          actual.classList.remove("abierto");
          actual.querySelector(".historial")?.classList.remove("abierto");
          actual.querySelector(".cliente-header")?.setAttribute("aria-expanded", "false");
        }
      });

      const abierto = cont.classList.toggle("abierto");
      panel.classList.toggle("abierto");
      header.setAttribute("aria-expanded", abierto ? "true" : "false");
    });

    btnEditar.addEventListener("click", () => abrirEditorCliente(c.id));
    btnReasignar.addEventListener("click", () => iniciarReasignacion(c.id));
    btnEliminar.addEventListener("click", () => pedirConfirmacion(c.id));

    listaClientes.appendChild(cont);
  });
}

function abrirEditorCliente(id) {
  const c = clientes.find(x => x.id === id);
  if (!c) return;

  clienteIdEditar = id;
  editNombre.value = c.nombre || "";
  editTelefono.value = valorCliente(c, "telefono", "0");
  editPeso.value = valorCliente(c, "peso", 0);
  editAltura.value = valorCliente(c, "altura", 0);
  confirmEditar.style.display = "flex";
}

function cancelarEdicionCliente() {
  clienteIdEditar = null;
  confirmEditar.style.display = "none";
}

async function guardarEdicionCliente() {
  if (!clienteIdEditar) return;

  const nombre = editNombre.value.trim();
  if (!nombre) {
    await appAlert("El nombre es obligatorio", "Clientes");
    return;
  }

  const telefono = editTelefono.value.trim() || "0";
  const pesoNum = Number(editPeso.value);
  const alturaNum = Number(editAltura.value);
  const peso = Number.isFinite(pesoNum) ? pesoNum : 0;
  const altura = Number.isFinite(alturaNum) ? alturaNum : 0;

  const lista = obtenerClientes();
  let actualizado = null;

  const nuevaLista = lista.map(c => {
    if (c.id !== clienteIdEditar) return c;

    actualizado = {
      ...c,
      nombre,
      telefono,
      peso,
      altura
    };

    return actualizado;
  });

  if (!actualizado) return;

  safeSet("clientes", nuevaLista);
  new BroadcastChannel("victory-data").postMessage("clientes");

  if (navigator.onLine && typeof actualizarClienteSupabase === "function") {
    await actualizarClienteSupabase(actualizado);
  }

  cancelarEdicionCliente();
  cargarClientes();
}

function filtrar() {
  const q = normalizarTexto(busqueda.value);
  render(clientes.filter(c =>
    normalizarTexto(c.nombre).includes(q)
  ));
}

function pedirConfirmacion(id) {
  clienteIdEliminar = id;
  confirmBorrar.style.display = "flex";
}

function cancelarBorrado() {
  clienteIdEliminar = null;
  confirmBorrar.style.display = "none";
}

async function confirmarBorrado() {
  if (!clienteIdEliminar) return;

  const listaLocal = obtenerClientes();
  const cliente = listaLocal.find(c => c.id === clienteIdEliminar);
  if (!cliente) return;

  if (navigator.onLine && window.borrarClienteSupabase) {
    await borrarClienteSupabase(cliente.id);
  }

  const nuevaLista = listaLocal.filter(c => c.id !== cliente.id);
  safeSet("clientes", nuevaLista);
  new BroadcastChannel("victory-data").postMessage("clientes");

  cancelarBorrado();
  cargarClientes();
}

function resetFlujoReasignacion() {
  pagoReasignacionConfirmado = false;
  pagoRecibidoReasignacion = COSTO_REASIGNACION_TARJETA;
  cambioReasignacion = 0;

  if (pagoReasignacion) {
    pagoReasignacion.disabled = false;
    pagoReasignacion.value = COSTO_REASIGNACION_TARJETA.toFixed(2);
  }

  if (btnConfirmarPagoReasignacion) {
    btnConfirmarPagoReasignacion.disabled = false;
    btnConfirmarPagoReasignacion.textContent = `Confirmar pago de ${fmtMoney(COSTO_REASIGNACION_TARJETA)}`;
  }

  if (txtPasoReasignacion) {
    txtPasoReasignacion.textContent = "Confirma el pago para iniciar lectura de tarjeta.";
  }

  estadoTarjeta.className = "estado amarillo";
  estadoTarjeta.textContent = "Pago pendiente";

  recalcularPagoReasignacion();
}

function recalcularPagoReasignacion() {
  if (!pagoReasignacion || !btnConfirmarPagoReasignacion || !cambioReasignacionTexto) return;
  if (pagoReasignacionConfirmado) return;

  const pago = Number(pagoReasignacion.value);
  pagoRecibidoReasignacion = Number.isFinite(pago) ? pago : 0;
  const diferencia = Number((pagoRecibidoReasignacion - COSTO_REASIGNACION_TARJETA).toFixed(2));
  cambioReasignacion = diferencia > 0 ? diferencia : 0;

  if (diferencia < 0) {
    cambioReasignacionTexto.textContent = `Falta: ${fmtMoney(Math.abs(diferencia))}`;
    cambioReasignacionTexto.style.color = "#ff8e8e";
    btnConfirmarPagoReasignacion.disabled = true;
    btnConfirmarPagoReasignacion.textContent = `Falta ${fmtMoney(Math.abs(diferencia))}`;
    return;
  }

  cambioReasignacionTexto.textContent = `Cambio: ${fmtMoney(cambioReasignacion)}`;
  cambioReasignacionTexto.style.color = "#2ecc71";
  btnConfirmarPagoReasignacion.disabled = false;
  btnConfirmarPagoReasignacion.textContent = `Confirmar pago de ${fmtMoney(COSTO_REASIGNACION_TARJETA)}`;
}

async function confirmarPagoReasignacion() {
  if (pagoReasignacionConfirmado || !clienteIdReasignar) return;

  if (!Number.isFinite(pagoRecibidoReasignacion) || pagoRecibidoReasignacion < COSTO_REASIGNACION_TARJETA) {
    await appAlert("El pago no cubre el costo de la reasignación.", "Pago insuficiente");
    return;
  }

  if (stockTarjetasDisponibles() <= 0) {
    await appAlert("No hay tarjetas disponibles en stock.", "Stock de tarjetas");
    return;
  }

  const confirmar = await appConfirm(
    `Confirmar cobro de reasignación de tarjeta.\nTotal: ${fmtMoney(COSTO_REASIGNACION_TARJETA)}\nPago: ${fmtMoney(pagoRecibidoReasignacion)}\nCambio: ${fmtMoney(cambioReasignacion)}`,
    "Confirmar pago"
  );

  if (!confirmar) return;

  pagoReasignacionConfirmado = true;
  pagoReasignacion.disabled = true;
  btnConfirmarPagoReasignacion.disabled = true;
  btnConfirmarPagoReasignacion.textContent = `Pago confirmado (${fmtMoney(pagoRecibidoReasignacion)})`;
  txtPasoReasignacion.textContent = "Acerque la nueva tarjeta";
  estadoTarjeta.className = "estado amarillo";
  estadoTarjeta.textContent = "Esperando tarjeta...";

  iniciarLecturaTarjetaReasignacion();
}

async function uidYaAsignadaAOtro(uid, clienteActualId) {
  uid = normalizarUID(uid);

  const lista = obtenerClientes();
  if (lista.some(c => c.id !== clienteActualId && normalizarUID(c.tarjetaUID) === uid)) {
    return true;
  }

  const empleados = safeGet("empleados");
  if (empleados.some(e => normalizarUID(e.tarjetaUID) === uid)) {
    return true;
  }

  if (navigator.onLine && window.supabaseClient) {
    const { data: c1 } = await supabaseClient
      .from("clientes")
      .select("id")
      .ilike("tarjeta_uid", uid)
      .maybeSingle();

    if (c1 && String(c1.id) !== String(clienteActualId)) return true;

    const { data: c2 } = await supabaseClient
      .from("empleados")
      .select("id")
      .ilike("tarjeta_uid", uid)
      .maybeSingle();

    if (c2) return true;
  }

  return false;
}

function iniciarLecturaTarjetaReasignacion() {
  detenerNFC();
  leyendoTarjeta = false;

  iniciarNFCControlado({
    onUID: async uidNuevo => {
      uidNuevo = normalizarUID(uidNuevo);

      if (leyendoTarjeta || !clienteIdReasignar) return;
      leyendoTarjeta = true;

      const clienteObjetivo = obtenerClientes().find(c => c.id === clienteIdReasignar);
      if (!clienteObjetivo) {
        estadoTarjeta.className = "estado rojo";
        estadoTarjeta.textContent = "Cliente no encontrado";
        leyendoTarjeta = false;
        return;
      }

      if (await uidYaAsignadaAOtro(uidNuevo, clienteIdReasignar)) {
        estadoTarjeta.className = "estado rojo";
        estadoTarjeta.textContent = "Tarjeta ya asignada a otro usuario";
        leyendoTarjeta = false;
        return;
      }

      const stockAntes = stockTarjetasDisponibles();
      const descuento = (typeof descontarStockTarjetas === "function")
        ? descontarStockTarjetas(1)
        : { ok: true };

      if (!descuento?.ok) {
        estadoTarjeta.className = "estado rojo";
        estadoTarjeta.textContent = "Sin tarjetas disponibles";
        leyendoTarjeta = false;
        return;
      }

      let clienteActualizado = null;
      let uidAnterior = null;

      try {
        const lista = obtenerClientes().map(c => {
          if (c.id === clienteIdReasignar) {
            uidAnterior = c.tarjetaUID;
            const actualizado = { ...c, tarjetaUID: uidNuevo };
            clienteActualizado = actualizado;
            return actualizado;
          }
          return c;
        });

        if (!clienteActualizado) {
          if (typeof guardarStockTarjetas === "function") {
            guardarStockTarjetas({ cantidad: stockAntes });
          }
          estadoTarjeta.className = "estado rojo";
          estadoTarjeta.textContent = "Cliente no encontrado";
          leyendoTarjeta = false;
          return;
        }

        safeSet("clientes", lista);
        new BroadcastChannel("victory-data").postMessage("clientes");

        if (typeof actualizarClienteSupabase === "function") {
          await actualizarClienteSupabase(clienteActualizado);
        }

        if (typeof migrarUIDEnAttendance === "function") {
          await migrarUIDEnAttendance(uidAnterior, uidNuevo);
        }

        let ventaOk = true;
        if (typeof registrarReasignacionTarjetaIngreso === "function") {
          ventaOk = await registrarReasignacionTarjetaIngreso({
            cliente: clienteActualizado,
            total: COSTO_REASIGNACION_TARJETA,
            pago: pagoRecibidoReasignacion,
            cambio: cambioReasignacion,
            uidAnterior,
            uidNuevo
          });
        }

        estadoTarjeta.className = "estado verde";
        estadoTarjeta.textContent = ventaOk === false
          ? "Tarjeta reasignada (venta pendiente de sincronizacion)"
          : "Tarjeta reasignada y cobrada";

        setTimeout(() => {
          cancelarReasignacion();
          cargarClientes();
        }, 1600);
      } catch (error) {
        console.error("[CLIENTES] Error en reasignación:", error);
        if (typeof guardarStockTarjetas === "function") {
          guardarStockTarjetas({ cantidad: stockAntes });
        }
        estadoTarjeta.className = "estado rojo";
        estadoTarjeta.textContent = "No se pudo completar la reasignación";
        leyendoTarjeta = false;
      }
    }
  });
}

async function iniciarReasignacion(clienteId) {
  if (stockTarjetasDisponibles() <= 0) {
    await appAlert("No hay tarjetas disponibles en stock.", "Stock de tarjetas");
    return;
  }

  clienteIdReasignar = clienteId;
  leyendoTarjeta = false;

  if (montoReasignacion) {
    montoReasignacion.textContent = fmtMoney(COSTO_REASIGNACION_TARJETA);
  }

  resetFlujoReasignacion();
  confirmReasignar.style.display = "flex";
}

function cancelarReasignacion() {
  clienteIdReasignar = null;
  leyendoTarjeta = false;
  pagoReasignacionConfirmado = false;
  detenerNFC();
  confirmReasignar.style.display = "none";
}
</script>
