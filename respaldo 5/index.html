<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio - Victory Pro Fitness</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<header class="header-brand">
  <div class="brand">
    <img src="img/logo.png">
    <h2>Asistencias del dia</h2>
  </div>

  <div class="estado-sistema">
    <span id="contadorAforo" class="contador">
      Dentro: <strong>0</strong>
    </span>

    <span id="estadoLector" class="lector off">Lector inactivo</span>
    <span id="estadoConexion" class="lector off">Offline</span>
    <span id="totalVentasHoy" class="contador total-ventas">
      Total de ventas: <strong>$0.00</strong>
    </span>
    <button id="btnVisitaRapida" class="btn-visita" type="button" onclick="registrarVisitaRapida()">
      Visita
    </button>

  </div>
</header>

<div class="panel-acciones">
  <button class="destacado" onclick="location.href='registro.html'">Registro</button>
  <button onclick="location.href='pos.html'">Ventas</button>
  <button onclick="location.href='stock.html'">Stock</button>
  <button onclick="location.href='membresias.html'">Membresias</button>
  <button onclick="location.href='clientes.html'">Clientes</button>
  <button onclick="location.href='historial.html'">Historial</button>
</div>

<div id="contenedorTabla" style="max-height:70vh; overflow-y:auto;">
  <table>
    <thead>
      <tr>
        <th>Cliente</th>
        <th>Entrada</th>
        <th>Salida</th>
      </tr>
    </thead>
    <tbody id="tablaAsistencias"></tbody>
  </table>
</div>

<div class="confirmacion" id="confirmacion">
  <div class="box">
    <h1 id="tituloConfirmacion"></h1>
    <p id="mensajeConfirmacion"></p>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/config.js"></script>
<script src="js/ui.js"></script>
<script src="js/corte-utils.js"></script>
<script src="js/ingresos.js"></script>
<script src="js/asistencias.js"></script>
<script src="js/realtime.js"></script>
<script src="js/nfc.js"></script>
<script src="js/bluetooth.js"></script>

<script>

let ultimoUIDLeido = null;
let ultimoTSLeido = 0;
const COOLDOWN_LECTURA_MS = 3000;
const DIAS_GRACIA_MEMBRESIA = 2;
const PERMITIR_ENTRADA_EN_GRACIA = true;
const HEARTBEAT_STALE_MS = 20000;
const COSTO_VISITA = typeof getPrecioVisita === "function" ? getPrecioVisita() : 60;

let estadoCanalNFC = "INIT";
let ultimoHeartbeatLector = 0;
let monitorHeartbeatId = null;
const clientesEnProceso = new Set();

/* ================= INIT ================= */
window.addEventListener("load", () => {

  const estadoLector = document.getElementById("estadoLector");
  const estadoConexion = document.getElementById("estadoConexion");

  actualizarEstadoConexion(estadoConexion);
  window.addEventListener("online", () => actualizarEstadoConexion(estadoConexion));
  window.addEventListener("offline", () => actualizarEstadoConexion(estadoConexion));

  cargarAsistencias();
  actualizarContador();
  iniciarSyncVentasInicio();
  actualizarTotalVentasInicio();

  iniciarLecturaNFCIndex(estadoLector);
  iniciarMonitorHeartbeat(estadoLector);
});

/* ================= CONEXION ================= */
function actualizarEstadoConexion(el) {
  if (!el) return;

  if (navigator.onLine) {
    el.textContent = "Online";
    el.className = "lector on";
  } else {
    el.textContent = "Offline";
    el.className = "lector off";
  }
}

function setEstadoLector(el, modo, texto) {
  if (!el) return;
  el.className = `lector ${modo}`;
  el.textContent = texto;
}

function actualizarEstadoCanal(estadoLector, status) {
  const s = String(status || "").toUpperCase();
  estadoCanalNFC = s;

  if (s === "SUBSCRIBED") {
    ultimoHeartbeatLector = Date.now();
    setEstadoLector(estadoLector, "on", "Lector activo");
    return;
  }

  if (s === "RECONNECTING") {
    setEstadoLector(estadoLector, "warn", "Reconectando lector");
    return;
  }

  if (["CHANNEL_ERROR", "TIMED_OUT", "CLOSED", "ERROR_NO_SUPABASE"].includes(s)) {
    setEstadoLector(estadoLector, "off", "Lector sin senal");
    return;
  }
}

function marcarHeartbeatLector(estadoLector, detalle = "") {
  ultimoHeartbeatLector = Date.now();

  if (estadoCanalNFC === "SUBSCRIBED") {
    const sufijo = detalle ? ` (${detalle})` : "";
    setEstadoLector(estadoLector, "on", `Lector activo${sufijo}`);
  }
}

function iniciarMonitorHeartbeat(estadoLector) {
  if (monitorHeartbeatId) clearInterval(monitorHeartbeatId);

  monitorHeartbeatId = setInterval(() => {
    if (!estadoLector || estadoCanalNFC !== "SUBSCRIBED") return;

    const delta = Date.now() - ultimoHeartbeatLector;
    if (!ultimoHeartbeatLector || delta > HEARTBEAT_STALE_MS) {
      setEstadoLector(estadoLector, "warn", "Activo sin lecturas recientes");
    }
  }, 3000);
}

/* ================= CONFIRMACION ================= */
function mostrarConfirmacion(tipo, titulo, mensaje) {
  const box = document.getElementById("confirmacion");

  document.getElementById("tituloConfirmacion").textContent = titulo;
  document.getElementById("mensajeConfirmacion").textContent = mensaje;

  box.className = "confirmacion " + tipo;
  box.style.display = "flex";

  setTimeout(() => {
    box.style.display = "none";
  }, 2200);
}

/* ================= VENTAS HOY ================= */
function claveVenta(v) {
  const id = String(v?.id || "").trim();
  if (id) return `id:${id}`;
  return [
    String(v?.fecha || ""),
    String(v?.hora || ""),
    String(v?.folio || ""),
    String(v?.total || "")
  ].join("|");
}

function totalVentaRegistro(v) {
  if (typeof corteTotalVenta === "function") {
    return corteTotalVenta(v);
  }
  const total = Number(v?.total);
  return Number.isFinite(total) ? total : 0;
}

function rangoHoyTs() {
  const now = new Date();
  const inicio = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0).getTime();
  const fin = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0, 0).getTime();
  return { inicio, fin };
}

function filtrarVentasHoy(ventas) {
  const { inicio, fin } = rangoHoyTs();
  return (Array.isArray(ventas) ? ventas : []).filter(v => {
    const ts = Number(v?.ts || 0);
    if (Number.isFinite(ts) && ts > 0) {
      return ts >= inicio && ts < fin;
    }
    return String(v?.fecha || "") === hoy();
  });
}

async function obtenerVentasHoy() {
  const map = new Map();
  const locales = safeGet("historial_ventas_local");
  filtrarVentasHoy(locales).forEach(v => map.set(claveVenta(v), v));

  if (navigator.onLine && window.supabaseClient) {
    const { inicio, fin } = rangoHoyTs();
    const { data, error } = await window.supabaseClient
      .from("historial_ventas")
      .select("*")
      .gte("ts", inicio)
      .lt("ts", fin);

    if (!error) {
      filtrarVentasHoy(data || []).forEach(v => map.set(claveVenta(v), v));
    }
  }

  return Array.from(map.values());
}

async function actualizarTotalVentasInicio() {
  const el = document.getElementById("totalVentasHoy");
  if (!el) return;

  try {
    const ventas = await obtenerVentasHoy();
    const total = ventas.reduce((acc, v) => acc + totalVentaRegistro(v), 0);
    const strong = el.querySelector("strong");
    if (strong) {
      strong.textContent = `$${total.toFixed(2)}`;
    } else {
      el.textContent = `Total de ventas: $${total.toFixed(2)}`;
    }
  } catch (error) {
    console.warn("[INDEX] No se pudo actualizar total de ventas:", error);
  }
}

function iniciarSyncVentasInicio() {
  const bc = new BroadcastChannel("victory-data");
  bc.onmessage = e => {
    if (e.data === "historial_ventas" || e.data === "ventas") {
      actualizarTotalVentasInicio();
    }
  };

  window.addEventListener("storage", e => {
    if (e.key === "historial_ventas_local") {
      actualizarTotalVentasInicio();
    }
  });

  window.addEventListener("online", () => actualizarTotalVentasInicio());
}

async function registrarVisitaRapida() {
  const confirmar = await appConfirm(
    `Confirmar cobro de visita por $${COSTO_VISITA.toFixed(2)}?`,
    "Registrar visita"
  );
  if (!confirmar) return;

  if (typeof registrarVisitaIngreso !== "function") {
    await appAlert("No se pudo registrar la visita.", "Error");
    return;
  }

  const ok = await registrarVisitaIngreso();
  await actualizarTotalVentasInicio();

  if (ok === false) {
    mostrarConfirmacion("gracia", "Visita registrada", "Pendiente de sincronizacion");
    return;
  }

  mostrarConfirmacion("entrada", "Visita registrada", `Cobro aplicado: $${COSTO_VISITA.toFixed(2)}`);
}

/* ================= NFC ================= */
function iniciarLecturaNFCIndex(estadoLector) {

  if (!estadoLector) return;

  setEstadoLector(estadoLector, "warn", "Conectando lector...");

  if (typeof iniciarNFCControlado === "function") {
    iniciarNFCControlado({
      onUID: uid => {
        marcarHeartbeatLector(estadoLector, "lectura recibida");
        procesarTarjeta(uid);
      },
      onHeartbeat: evento => {
        marcarHeartbeatLector(
          estadoLector,
          `ultima ${horaDesdeTS(evento?.ts || Date.now())}`
        );
      },
      onStatus: status => {
        actualizarEstadoCanal(estadoLector, status);
      },
      onTimeout: () => {
        if (estadoCanalNFC === "SUBSCRIBED") {
          setEstadoLector(estadoLector, "warn", "Esperando tarjeta...");
        }
      },
      onError: () => {
        setEstadoLector(estadoLector, "off", "Lector con error");
        if (typeof detenerNFC === "function") detenerNFC();
        setTimeout(() => iniciarLecturaNFCIndex(estadoLector), 1800);
      }
    });
  }
}

function parseFechaLocal(ymd) {
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(ymd || ""));
  if (!m) return null;
  const y = Number(m[1]);
  const mo = Number(m[2]);
  const d = Number(m[3]);
  const dt = new Date(y, mo - 1, d, 0, 0, 0, 0);
  return Number.isNaN(dt.getTime()) ? null : dt;
}

function evaluarMembresia(membresiaExpira) {
  const fechaExp = parseFechaLocal(membresiaExpira);
  if (!fechaExp) {
    return {
      estado: "vencida",
      diasRestantes: null,
      mensaje: "Membresia no configurada"
    };
  }

  const hoyLocal = new Date();
  hoyLocal.setHours(0, 0, 0, 0);
  const msDia = 24 * 60 * 60 * 1000;
  const diasRestantes = Math.floor((fechaExp.getTime() - hoyLocal.getTime()) / msDia);

  if (diasRestantes >= 0) {
    const msg = diasRestantes === 0
      ? "Membresia vigente (vence hoy)"
      : `Membresia vigente (${diasRestantes} dia(s) restantes)`;
    return { estado: "vigente", diasRestantes, mensaje: msg };
  }

  if (diasRestantes >= -DIAS_GRACIA_MEMBRESIA) {
    const diasGracia = Math.abs(diasRestantes);
    return {
      estado: "gracia",
      diasRestantes,
      mensaje: `Periodo de gracia (${diasGracia} dia(s) vencido)`
    };
  }

  return {
    estado: "vencida",
    diasRestantes,
    mensaje: `Membresia vencida hace ${Math.abs(diasRestantes)} dia(s)`
  };
}

function clienteDentroLocal(clienteId) {
  const asistencias = obtenerAsistencias();
  if (!Array.isArray(asistencias)) return false;

  return asistencias.some(a =>
    a &&
    a.fecha === hoy() &&
    String(a.cliente_id || "") === String(clienteId) &&
    a.entrada_ts &&
    !a.salida_ts
  );
}

async function resolverAccionEsperada(clienteId) {
  const estadoLocal = clienteDentroLocal(clienteId) ? "dentro" : "fuera";

  if (!window.supabaseClient || !navigator.onLine) {
    return {
      accionEsperada: estadoLocal === "dentro" ? "salida" : "entrada",
      estadoActual: estadoLocal,
      fuente: "local"
    };
  }

  const { inicioISO, finISO } = rangoHoyISO();
  const { data, error } = await window.supabaseClient
    .from("attendance")
    .select("type,created_at")
    .eq("cliente_id", clienteId)
    .gte("created_at", inicioISO)
    .lt("created_at", finISO)
    .order("created_at", { ascending: false })
    .limit(1);

  if (error) {
    console.warn("[INDEX] No se pudo validar estado remoto de asistencia:", error.message || error);
    return {
      accionEsperada: estadoLocal === "dentro" ? "salida" : "entrada",
      estadoActual: estadoLocal,
      fuente: "local"
    };
  }

  const ultimoTipo = data?.[0]?.type;
  if (!ultimoTipo) {
    return {
      accionEsperada: estadoLocal === "dentro" ? "salida" : "entrada",
      estadoActual: estadoLocal,
      ultimoTipo: null,
      fuente: "local"
    };
  }

  const estadoRemoto = ultimoTipo === "entrada" ? "dentro" : "fuera";

  return {
    accionEsperada: estadoRemoto === "dentro" ? "salida" : "entrada",
    estadoActual: estadoRemoto,
    ultimoTipo: ultimoTipo || null,
    fuente: "remoto"
  };
}

async function registrarAsistenciaConControl({ clienteId, uid, accion }) {
  const payload = {
    id: crypto.randomUUID(),
    cliente_id: clienteId,
    uid,
    created_at: new Date().toISOString(),
    type: accion,
    source: "wifi",
    device_id: "pc_principal"
  };

  const { error } = await window.supabaseClient
    .from("attendance")
    .insert(payload);

  if (!error) {
    return { accion };
  }

  console.warn("[INDEX] Insert directo attendance fallo, usando RPC fallback:", error.message || error);

  const rpc = await window.supabaseClient.rpc("registrar_asistencia", {
    p_id: payload.id,
    p_cliente_id: payload.cliente_id,
    p_uid: payload.uid,
    p_created_at: payload.created_at,
    p_source: payload.source,
    p_device_id: payload.device_id
  });

  if (rpc.error) {
    throw rpc.error;
  }

  const resultadoRpc = Array.isArray(rpc.data) ? rpc.data[0] : rpc.data;
  return { accion: resultadoRpc?.accion || accion };
}

/* ================= PROCESAR TARJETA ================= */
async function procesarTarjeta(uid) {

  if (!window.supabaseClient) return;
  uid = normalizarUID(uid);
  const ahoraMs = Date.now();

  if (uid === ultimoUIDLeido && (ahoraMs - ultimoTSLeido) < COOLDOWN_LECTURA_MS) {
    console.info(`[INDEX] UID ignorado por cooldown uid=${uid}`);
    return;
  }

  ultimoUIDLeido = uid;
  ultimoTSLeido = ahoraMs;
  let clienteIdProcesado = null;

  try {

    let { data: cliente, error: errorCliente } = await window.supabaseClient
      .from("clientes")
      .select("id, nombre, membresia_expira")
      .eq("tarjeta_uid", uid)
      .maybeSingle();

    if (!cliente) {
      const alt = await window.supabaseClient
        .from("clientes")
        .select("id, nombre, membresia_expira")
        .ilike("tarjeta_uid", uid)
        .maybeSingle();

      cliente = alt.data;
      errorCliente = alt.error;
    }

    if (errorCliente || !cliente) {
      mostrarConfirmacion("error", "Tarjeta no registrada", "Consulte recepcion");
      return;
    }

    if (clientesEnProceso.has(cliente.id)) {
      console.info(`[INDEX] Cliente en proceso, lectura ignorada cliente=${cliente.id}`);
      return;
    }

    clienteIdProcesado = cliente.id;
    clientesEnProceso.add(cliente.id);

    const control = await resolverAccionEsperada(cliente.id);
    const accionEsperada = control.accionEsperada;

    const estadoMembresia = evaluarMembresia(cliente.membresia_expira);
    if (accionEsperada === "entrada") {
      if (estadoMembresia.estado === "vencida") {
        mostrarConfirmacion("error", "Acceso bloqueado", `${cliente.nombre} - ${estadoMembresia.mensaje}`);
        return;
      }

      if (estadoMembresia.estado === "gracia" && !PERMITIR_ENTRADA_EN_GRACIA) {
        mostrarConfirmacion("error", "Acceso bloqueado", `${cliente.nombre} - Fuera de vigencia`);
        return;
      }
    }

    const resultado = await registrarAsistenciaConControl({
      clienteId: cliente.id,
      uid,
      accion: accionEsperada
    });

    if (resultado?.accion !== accionEsperada) {
      mostrarConfirmacion(
        "error",
        "Secuencia invalida",
        "Anti-passback activo: el sistema detecto una accion fuera de orden"
      );
      console.warn("[ANTI-PASSBACK] Accion inesperada", {
        clienteId: cliente.id,
        esperado: accionEsperada,
        recibido: resultado?.accion,
        fuente: control.fuente
      });
      return;
    }

    if (resultado.accion === "entrada") {
      if (estadoMembresia.estado === "gracia") {
        mostrarConfirmacion("gracia", "Acceso en gracia", `${cliente.nombre} - ${estadoMembresia.mensaje}`);
      } else {
        mostrarConfirmacion("entrada", "Bienvenido", cliente.nombre);
      }
    } else if (resultado.accion === "salida") {
      mostrarConfirmacion("salida", "Hasta luego", cliente.nombre);
    }

    if (typeof reconstruirAsistenciasHoy === "function") {
      await reconstruirAsistenciasHoy();
    }

  } catch (err) {
    console.error("[INDEX] Error procesando tarjeta:", err);
    mostrarConfirmacion("error", "Error de lectura", "Consulte recepcion");
  } finally {
    if (clienteIdProcesado) {
      clientesEnProceso.delete(clienteIdProcesado);
    }
  }
}

</script>

</body>
</html>
