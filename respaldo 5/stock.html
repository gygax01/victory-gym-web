<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock</title>

<link rel="stylesheet" href="css/styles.css">

<!-- SUPABASE (ESTA ES LA BUENA) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- ===== ADAPTACION SOLO TAMANO MOVIL ===== -->
<style>
@media (max-width:768px){

  .header-brand{
    flex-direction:column;
    gap:14px;
    padding:18px;
    text-align:center;
  }

  .brand{
    flex-direction:column;
    gap:8px;
  }

  .brand img{
    height:70px;
  }

  .brand h2{
    font-size:20px;
  }

  .header-brand > div:last-child{
    flex-direction:column;
    width:100%;
  }

  .header-brand button{
    width:100%;
  }

  .card.stock-nuevo{
    width:92%;
    margin:20px auto;
    padding:24px 18px;
  }

  .card.stock-nuevo .stock-form{
    grid-template-columns:1fr !important;
    gap:12px;
  }

  .card.stock-nuevo input,
  .card.stock-nuevo button{
    width:100% !important;
    height:46px;
    font-size:14px;
  }

  .search-bar{
    width:92%;
  }

  .search-bar input{
    height:46px;
    font-size:15px;
  }

  .stock-grid{
    width:92%;
    grid-template-columns:1fr;
  }

  .stock-card{
    padding:18px;
  }

  .stock-card h4{
    font-size:16px;
  }

  .stock-card input{
    height:44px;
    font-size:14px;
    margin-top:6px;
  }

  .stock-footer{
    width:92%;
    text-align:center;
  }

  .stock-footer button{
    width:100%;
    margin-top:10px;
    height:46px;
  }

  .modal-card{
    width:92%;
  }

}

.auditoria-box{
  display:grid;
  gap:8px;
  margin-top: 18px;
}

.auditoria-box label{
  font-size: 13px;
  opacity:.88;
  text-align:left;
}

.auditoria-box input{
  margin:0;
}

.folio-previo{
  text-align:left;
  opacity:.7;
  font-size:12px;
}
</style>
</head>

<body onload="initStock()">

<header class="header-brand">
  <div class="brand">
    <img src="img/logo.png">
    <h2>Stock</h2>
  </div>

  <div style="display:flex; gap:10px;">
    <button onclick="abrirModalHistorial()" style="opacity:.85">
      Historial de Cambios
    </button>
    <button onclick="abrirModalHistorialVentas()" style="opacity:.85">
      Historial de Ventas
    </button>
    <button onclick="abrirModalCorte()" style="opacity:.85">
      Corte
    </button>
    <button onclick="location.href='index.html'">&larr; Inicio</button>
  </div>
</header>

<!-- ================= MODAL MASTER ================= -->
<div id="modalMaster" class="modal-overlay">
  <div class="modal-card pop">
    <h3>&#128274; Acceso restringido</h3>
    <p>Ingresa la contrase&ntilde;a maestra</p>
    <input id="inputMaster" type="password">
    <div id="msgMaster" class="modal-msg"></div>
    <div class="modal-actions">
      <button onclick="cerrarModal()">Cancelar</button>
      <button class="btn-ok" onclick="confirmarMaster()">Entrar</button>
    </div>
  </div>
</div>

<!-- ================= NUEVO PRODUCTO (SOLO EDICION) ================= -->
<div
  class="card stock-nuevo"
  data-permission="products_create"
  id="panelNuevoProducto"
  style="display:none"
>
  <h3>Nuevo producto</h3>
  <div class="stock-form">
    <input id="inputNombre" placeholder="Nombre">
    <input id="inputPrecio" type="number" step="0.01" placeholder="Precio">
    <input id="inputStock" type="number" placeholder="Stock inicial">
    <button onclick="solicitarAltaProducto()">Agregar</button>
  </div>
</div>

<!-- ================= BUSCADOR ================= -->
<div class="search-bar">
  <input id="buscadorStock" placeholder="Buscar producto...">
</div>

<!-- ================= LISTA ================= -->
<div class="stock-grid" id="listaStock"></div>

<!-- ================= AUDITORIA ================= -->
<div class="stock-footer auditoria-box" id="panelAuditoria" style="display:none">
  <label for="inputReferenciaCambio">Referencia (ticket/nota) *</label>
  <input
    id="inputReferenciaCambio"
    maxlength="120"
    placeholder="Ej: Ajuste inventario turno noche #T-2041"
  >
  <div class="folio-previo" id="previewFolio">
    El folio se genera al guardar.
  </div>
</div>

<!-- ================= PANEL EDICION ================= -->
<div class="stock-footer" id="panelEdicion"></div>

<!-- CORE -->
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/config.js"></script>
<script src="js/ui.js"></script>
<script src="js/realtime.js"></script>

<script>
/* ================= STATE ================= */
let productos = [];
let productosFiltrados = [];
let modoEdicion = false;
let accionMaster = null;
let folioPendiente = "";

const MAX_PRECIO = 1000000;
const MAX_STOCK = 1000000;
const DELTA_STOCK_EXTREMO = 500;
const CAMBIO_PRECIO_EXTREMO_PCT = 0.5;

/* ================= DOM ================= */
const inputNombre   = document.getElementById("inputNombre");
const inputPrecio   = document.getElementById("inputPrecio");
const inputStock    = document.getElementById("inputStock");
const buscadorStock = document.getElementById("buscadorStock");
const listaStock    = document.getElementById("listaStock");
const panelEdicion  = document.getElementById("panelEdicion");
const panelNuevoProducto = document.getElementById("panelNuevoProducto");
const panelAuditoria = document.getElementById("panelAuditoria");
const inputReferenciaCambio = document.getElementById("inputReferenciaCambio");
const previewFolio = document.getElementById("previewFolio");

/* ================= INIT ================= */
function initStock() {

  buscadorStock.oninput = filtrarStock;

  iniciarSyncStock();
  cargarStock();
}

/* ================= SYNC ================= */
function iniciarSyncStock() {
  const bc = new BroadcastChannel("victory-data");

  bc.onmessage = e => {
    if (e.data === "productos") cargarStock();
  };

  window.addEventListener("storage", e => {
    if (e.key === "productos") cargarStock();
  });
}

/* ================= DATA ================= */
function cargarStock() {
  productos = JSON.parse(localStorage.getItem("productos") || "[]");
  productosFiltrados = [...productos];
  renderStock();
}

/* ================= RENDER ================= */
function renderStock() {
  listaStock.innerHTML = "";

  if (!productosFiltrados.length) {
    listaStock.innerHTML = "<p style='opacity:.6'>No hay productos</p>";
    return;
  }

  productosFiltrados.forEach(p => {
    const bajo = Number(p.stock) <= Number(p.stock_minimo || 0);

    const card = document.createElement("div");
    card.className = "stock-card" + (bajo ? " bajo" : "");

    card.innerHTML = `
      <h4 style="${bajo ? "color:#e74c3c" : ""}">${p.nombre}</h4>
      <div class="precio">$${Number(p.precio).toFixed(2)}</div>

      ${
        !modoEdicion
        ? `
          <div class="stock-cantidad">Stock: <span>${p.stock}</span></div>
          <div class="small">Stock m\u00ednimo: ${p.stock_minimo || 0}</div>
        `
        : `
          <input value="${p.nombre}">
          <input type="number" value="${p.precio}">
          <input type="number" value="${p.stock}">
          <input type="number" value="${p.stock_minimo || 0}">
          <input type="number" placeholder="Cantidad exacta (opcional)">
        `
      }
    `;

    listaStock.appendChild(card);
  });

  renderPanel();
}

/* ================= PANEL EDICION ================= */
function renderPanel() {
  panelEdicion.innerHTML = "";

  if (!modoEdicion) {
    panelNuevoProducto.style.display = "none";
    panelAuditoria.style.display = "none";
    folioPendiente = "";

    const btn = document.createElement("button");
    btn.textContent = "\u270F\uFE0F Editar stock";
    btn.onclick = () => {
      modoEdicion = true;
      folioPendiente = generarFolioStockLocal();
      renderStock();
    };
    panelEdicion.appendChild(btn);
  } else {
    panelNuevoProducto.style.display = "block";
    panelAuditoria.style.display = "grid";
    if (!folioPendiente) folioPendiente = generarFolioStockLocal();
    previewFolio.textContent = `Folio actual: ${folioPendiente}`;

    const guardar = document.createElement("button");
    guardar.className = "btn-guardar";
    guardar.textContent = "\uD83D\uDCBE Guardar cambios";
    guardar.onclick = () => {
      accionMaster = "guardar";
      abrirModalMaster();
    };

    const cancelar = document.createElement("button");
    cancelar.textContent = "\u274C Cancelar";
    cancelar.onclick = () => {
      modoEdicion = false;
      inputReferenciaCambio.value = "";
      folioPendiente = "";
      cargarStock();
    };

    panelEdicion.appendChild(guardar);
    panelEdicion.appendChild(cancelar);
  }
}

/* ================= MODAL ================= */
function abrirModalHistorial() {
  accionMaster = "historial";
  abrirModalMaster();
}

function abrirModalHistorialVentas() {
  accionMaster = "historial_ventas";
  abrirModalMaster();
}

function abrirModalCorte() {
  accionMaster = "corte";
  abrirModalMaster();
}

function solicitarAltaProducto() {
  accionMaster = "nuevo";
  abrirModalMaster();
}

function abrirModalMaster() {
  modalMaster.style.display = "flex";
  inputMaster.value = "";
  msgMaster.textContent = "";
  msgMaster.className = "modal-msg";
}

function cerrarModal() {
  modalMaster.style.display = "none";
}

/* ================= CONFIRMAR ================= */
function confirmarMaster() {
  if (!validarPasswordMaestra(inputMaster.value)) {
    msgMaster.textContent = "\u2716 Contrase\u00f1a incorrecta";
    msgMaster.className = "modal-msg error";
    return;
  }

  cerrarModal();

  if (accionMaster === "historial") {
    location.href = "historialstock.html";
    return;
  }

  if (accionMaster === "historial_ventas") {
    location.href = "historialventas.html?v=20260302";
    return;
  }

  if (accionMaster === "corte") {
    location.href = "corte.html";
    return;
  }

  if (accionMaster === "guardar") guardarCambiosStock();
  if (accionMaster === "nuevo") confirmarNuevoProducto();
}

function generarFolioStockLocal() {
  const baseFecha = hoy().replace(/-/g, "");
  const sufijo = Date.now().toString(36).toUpperCase().slice(-4);
  return `STK-${baseFecha}-${sufijo}`;
}

function esEnteroNoNegativo(n) {
  return Number.isInteger(n) && n >= 0;
}

function referenciaValida() {
  const ref = String(inputReferenciaCambio.value || "").trim();
  if (ref.length < 3) {
    appAlert("La referencia es obligatoria (minimo 3 caracteres).", "Stock");
    return null;
  }
  return ref.slice(0, 120);
}

function resumenCambioExtremo(op) {
  const partes = [];
  const deltaStock = Math.abs(op.despues.stock - op.antes.stock);
  const deltaMin = Math.abs(op.despues.stock_minimo - op.antes.stock_minimo);

  let cambioPrecio = 0;
  if (op.antes.precio === 0 && op.despues.precio > 0) cambioPrecio = 1;
  if (op.antes.precio > 0) {
    cambioPrecio = Math.abs((op.despues.precio - op.antes.precio) / op.antes.precio);
  }

  if (deltaStock >= DELTA_STOCK_EXTREMO) {
    partes.push(`stock ${op.antes.stock} -> ${op.despues.stock}`);
  }
  if (deltaMin >= DELTA_STOCK_EXTREMO) {
    partes.push(`stock m\u00ednimo ${op.antes.stock_minimo} -> ${op.despues.stock_minimo}`);
  }
  if (cambioPrecio >= CAMBIO_PRECIO_EXTREMO_PCT) {
    partes.push(`precio ${op.antes.precio} -> ${op.despues.precio}`);
  }

  if (!partes.length) return "";
  return `${op.nombre}: ${partes.join(", ")}`;
}

/* ================= GUARDAR CAMBIOS ================= */
async function guardarCambiosStock() {
  const referencia = referenciaValida();
  if (!referencia) return;

  const cards = document.querySelectorAll(".stock-card");
  const operaciones = [];

  for (let i = 0; i < cards.length; i++) {
    const inputs = cards[i].querySelectorAll("input");
    if (!inputs.length) continue;

    const nombreInput = inputs[0].value.trim();
    const precio = Number(inputs[1].value);
    const stockEdit = Number(inputs[2].value);
    const stockMin = Number(inputs[3].value);
    const exacto = inputs[4].value.trim();
    const nuevoStock = exacto !== "" ? Number(exacto) : stockEdit;

    const prod = productosFiltrados[i];
    if (!prod) continue;
    const nombre = nombreInput || (prod.nombre ?? "");

    if (!nombre) {
      await appAlert(`Producto invalido en fila ${i + 1}: el nombre es obligatorio.`, "Stock");
      return;
    }
    if (!Number.isFinite(precio) || precio < 0 || precio > MAX_PRECIO) {
      await appAlert(`Precio invalido en "${nombre}". Debe ser un numero entre 0 y ${MAX_PRECIO}.`, "Stock");
      return;
    }
    if (!esEnteroNoNegativo(nuevoStock) || nuevoStock > MAX_STOCK) {
      await appAlert(`Stock invalido en "${nombre}". Debe ser entero entre 0 y ${MAX_STOCK}.`, "Stock");
      return;
    }
    if (!esEnteroNoNegativo(stockMin) || stockMin > MAX_STOCK) {
      await appAlert(`Stock minimo invalido en "${nombre}". Debe ser entero entre 0 y ${MAX_STOCK}.`, "Stock");
      return;
    }

    const antes = {
      nombre: prod.nombre ?? "",
      stock: Number(prod.stock) || 0,
      precio: Number(prod.precio) || 0,
      stock_minimo: Number(prod.stock_minimo || 0)
    };
    const despues = {
      nombre,
      stock: Number.isFinite(nuevoStock) ? nuevoStock : antes.stock,
      precio: Number.isFinite(precio) ? precio : antes.precio,
      stock_minimo: Number.isFinite(stockMin) ? stockMin : antes.stock_minimo
    };

    const huboCambios =
      antes.nombre !== despues.nombre ||
      antes.stock !== despues.stock ||
      antes.precio !== despues.precio ||
      antes.stock_minimo !== despues.stock_minimo;

    if (!huboCambios) continue;

    operaciones.push({ prod, nombre, antes, despues });
  }

  if (!operaciones.length) {
    await appAlert("No hubo cambios para guardar.", "Stock");
    return;
  }

  const extremos = operaciones
    .map(resumenCambioExtremo)
    .filter(Boolean);

  if (extremos.length) {
    const preview = extremos.slice(0, 5).join("\n");
    const extra = extremos.length > 5
      ? `\n...y ${extremos.length - 5} cambios extremos m\u00e1s.`
      : "";
    const continuar = await appConfirm(
      `Se detectaron cambios extremos:\n${preview}${extra}\n\nDeseas continuar?`,
      "Cambios extremos"
    );
    if (!continuar) return;
  }

  for (const op of operaciones) {
    const { error } = await supabaseClient
      .from("productos")
      .update({
        nombre: op.nombre,
        precio: op.despues.precio,
        stock: op.despues.stock,
        stock_minimo: op.despues.stock_minimo
      })
      .eq("id", op.prod.id);

    if (error) {
      console.error("[STOCK] Error actualizando producto:", op.prod.id, error);
      await appAlert(`No se pudo guardar "${op.nombre}".`, "Stock");
      return;
    }

    op.prod.nombre = op.nombre;
    op.prod.precio = op.despues.precio;
    op.prod.stock = op.despues.stock;
    op.prod.stock_minimo = op.despues.stock_minimo;
  }

  const folio = folioPendiente || generarFolioStockLocal();
  await pushHistorialStock(
    operaciones.map(op => ({
      producto_id: op.prod.id,
      nombre: op.nombre,
      antes: op.antes,
      despues: op.despues
    })),
    {
      folio,
      referencia,
      tipo: "edicion_manual"
    }
  );

  if (typeof bc !== "undefined") {
    bc.postMessage("productos");
  } else {
    new BroadcastChannel("victory-data").postMessage("productos");
  }

  localStorage.setItem("productos", JSON.stringify(productos));
  inputReferenciaCambio.value = "";
  folioPendiente = "";
  location.reload();
}

/* ================= NUEVO PRODUCTO ================= */
async function confirmarNuevoProducto() {
  const referencia = referenciaValida();
  if (!referencia) return;

  const nombre = inputNombre.value.trim();
  const precio = Number(inputPrecio.value);
  const stockInicial = Number(inputStock.value || 0);

  if (!nombre) {
    await appAlert("El nombre del producto es obligatorio.", "Nuevo producto");
    return;
  }
  if (!Number.isFinite(precio) || precio < 0 || precio > MAX_PRECIO) {
    await appAlert(`Precio invalido. Debe ser un numero entre 0 y ${MAX_PRECIO}.`, "Nuevo producto");
    return;
  }
  if (!esEnteroNoNegativo(stockInicial) || stockInicial > MAX_STOCK) {
    await appAlert(`Stock inicial invalido. Debe ser entero entre 0 y ${MAX_STOCK}.`, "Nuevo producto");
    return;
  }

  const prod = {
    id: crypto.randomUUID(),
    nombre,
    precio,
    stock: stockInicial,
    stock_minimo: 0
  };

  await insertarProductoSupabase(prod);

  const folio = folioPendiente || generarFolioStockLocal();
  await pushHistorialStock(
    [{
      producto_id: prod.id,
      nombre: prod.nombre,
      antes: null,
      despues: {
        nombre: prod.nombre,
        stock: prod.stock,
        precio: prod.precio,
        stock_minimo: prod.stock_minimo
      }
    }],
    {
      folio,
      referencia,
      tipo: "alta_producto"
    }
  );

  inputNombre.value = "";
  inputPrecio.value = "";
  inputStock.value = "";
  inputReferenciaCambio.value = "";
  folioPendiente = "";

  location.reload();
}

/* ================= FILTRO ================= */
function filtrarStock() {
  const q = buscadorStock.value.toLowerCase();
  productosFiltrados = productos.filter(p =>
    p.nombre.toLowerCase().includes(q)
  );
  renderStock();
}
</script>

</body>
</html>
