<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial</title>
<link rel="stylesheet" href="css/styles.css">

<!-- ===== ADAPTACIÓN SOLO TAMAÑO MÓVIL ===== -->
<style>
@media (max-width: 768px){

  .header-brand{
    flex-direction: column;
    gap: 14px;
    padding: 18px;
    text-align:center;
  }

  .brand{
    flex-direction: column;
    gap: 8px;
  }

  .brand img{
    height: 70px;
  }

  .brand h2{
    font-size: 20px;
  }

  header button{
    width: 100%;
    margin-left: 0;
  }

  .search-bar{
    width: 92%;
  }

  .search-bar input{
    height: 46px;
    font-size: 15px;
  }

  .historial-container{
    width: 94%;
  }

  .cliente{
    padding: 16px;
  }

  .cliente h3{
    font-size: 20px;
  }

  .meta{
    font-size: 13px;
  }

  .flecha{
    font-size: 20px;
  }

  .historial{
    overflow-x: auto;
  }

  .historial table{
    font-size: 13px;
  }

  .historial th,
  .historial td{
    padding: 8px 6px;
  }

}
</style>
</head>

<body>

<header class="header-brand">
  <div class="brand">
    <img src="img/logo.png" alt="Victory Pro Fitness">
    <h2>Historial de clientes</h2>
  </div>
  <button onclick="location.href='index.html'">← Inicio</button>
</header>

<div class="search-bar">
  <input id="busqueda" placeholder="Buscar cliente...">
</div>

<div class="historial-container" id="listaHistorial"></div>

<!-- ===== JS BASE ===== -->
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- CREA window.supabaseClient -->
<script src="js/realtime.js"></script>

<script>
/* ================= ALIAS CRITICOS ================= */
function obtenerClientes() {
  return safeGet("clientes");
}

function obtenerAsistencias() {
  return safeGet("asistencias");
}

/* ================= DOM ================= */
const listaHistorial = document.getElementById("listaHistorial");
const busqueda = document.getElementById("busqueda");

/* ================= ESTADO ================= */
let clientes = [];
let asistencias = [];

/* ================= INIT ================= */
window.addEventListener("load", initHistorial);

async function initHistorial() {

  busqueda.addEventListener("input", filtrar);

  let cargado = false;

  if (navigator.onLine && window.supabaseClient) {
    cargado = await cargarAsistenciasDesdeSupabase();
  }

  // Si Supabase falla, usar cache local
  if (!cargado) {
    console.warn("Usando datos locales");
  }

  cargarHistorial();
  iniciarSyncHistorial();
}


/* ================= SUPABASE -> ASISTENCIAS ================= */
async function cargarAsistenciasDesdeSupabase() {
  const { data, error } = await supabaseClient
    .from("attendance")
    .select("*")
    .order("created_at", { ascending: true });

  if (error) {
    console.error("Error cargando asistencias:", error);
    return false;
  }

  if (!data || !data.length) return false;

  const sesiones = [];
  const abiertas = {};

  data.forEach(row => {
    const key = row.cliente_id || row.uid;

    const ts = new Date(row.created_at).getTime();
    if (!ts) return;

    if (row.type === "entrada") {
      abiertas[key] = {
        id: row.id,
        cliente_id: row.cliente_id ?? null,
        tarjetaUID: normalizarUID(row.uid),
        fecha: fechaDesdeTS(ts),
        entrada_ts: ts,
        salida_ts: null
      };
    }

    if (row.type === "salida" && abiertas[key]) {
      abiertas[key].salida_ts = ts;
      sesiones.push(abiertas[key]);
      delete abiertas[key];
    }
  });
  Object.values(abiertas).forEach(s => sesiones.push(s));
  sesiones.sort((a, b) => b.entrada_ts - a.entrada_ts);
  safeSet("asistencias", sesiones);
  return true;
}

/* ================= SINCRONIZACIÓN ================= */
function iniciarSyncHistorial() {
  const bc = new BroadcastChannel("victory-data");

  bc.onmessage = e => {
    if (["asistencias", "clientes"].includes(e.data)) {
      cargarHistorial();
    }
  };

  window.addEventListener("storage", e => {
    if (["asistencias", "clientes"].includes(e.key)) {
      cargarHistorial();
    }
  });
}
/* ================= UTILIDADES ================= */
function diasEntre(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}

function normalizarClienteHistorial(c) {
  return {
    ...c,
    id: c.id,
    nombre: c.nombre,
    tarjetaUID: c.tarjetaUID ?? c.tarjeta_uid ?? ""
  };
}

function registrosCliente(c) {
  return asistencias.filter(a =>
    (c.id && a.cliente_id && a.cliente_id === c.id) ||
    (!a.cliente_id && c.tarjetaUID && a.tarjetaUID === c.tarjetaUID)
  );
}

function ultimaVisita(cliente) {
  return registrosCliente(cliente)
    .map(a => a.fecha)
    .sort()
    .reverse()[0] ?? "—";
}

function calcularRachas(cliente) {
  const fechas = [...new Set(
    registrosCliente(cliente).map(a => a.fecha)
  )].sort();

  let max = 0, actual = 0, temp = fechas.length ? 1 : 0;

  for (let i = 1; i < fechas.length; i++) {
    if (diasEntre(fechas[i - 1], fechas[i]) === 1) temp++;
    else { max = Math.max(max, temp); temp = 1; }
  }
  max = Math.max(max, temp);

  for (let i = fechas.length - 1; i > 0; i--) {
    if (diasEntre(fechas[i - 1], fechas[i]) === 1) actual++;
    else break;
  }
  actual = fechas.length ? actual + 1 : 0;

  return { actual, max };
}

function horaLocalDesdeTS(ts) {
  if (!ts) return "-";
  return horaDesdeTS(ts) || "-";
}

/* ================= CARGA ================= */
function cargarHistorial() {
  clientes = obtenerClientes()
    .map(normalizarClienteHistorial)
    .filter(c => c && typeof c.nombre === "string");
  asistencias = obtenerAsistencias();

  clientes.sort((a, b) =>
    ultimaVisita(b)
      .localeCompare(ultimaVisita(a))
  );

  render(clientes);
}

/* ================= RENDER ================= */
function render(lista) {
  listaHistorial.innerHTML = "";

  if (!lista.length) {
    listaHistorial.innerHTML = "<p>No hay historial disponible</p>";
    return;
  }

  lista.forEach(c => {
    const registros = registrosCliente(c)
      .sort((a, b) => b.fecha.localeCompare(a.fecha));

    const { actual, max } = calcularRachas(c);

    const card = document.createElement("div");
    card.className = "cliente";

    card.innerHTML = `
      <div class="cliente-header" aria-expanded="false">
        <div class="info-wrapper">
          <div class="info-bloque">
            <h3>${c.nombre}</h3>
            <div class="meta">
              <span class="racha actual">Racha actual: ${actual} días</span>
              &nbsp; · &nbsp;
              <span class="racha maxima">Racha máxima: ${max} días</span>
            </div>
          </div>
        </div>
        <div class="flecha">▾</div>
      </div>

      <div class="historial">
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Entrada</th>
              <th>Salida</th>
            </tr>
          </thead>
          <tbody>
            ${
              registros.map((r, i) => `
                <tr class="${i % 2 ? 'alt' : ''}">
                  <td>${r.fecha}</td>
                  <td>${r.entrada_ts ? horaLocalDesdeTS(r.entrada_ts) : (r.entrada ?? "-")}</td>
                  <td>${r.salida_ts ? horaLocalDesdeTS(r.salida_ts) : (r.salida ?? "-")}</td>
                </tr>
              `).join("")
            }
          </tbody>
        </table>
      </div>
    `;

    const header = card.querySelector(".cliente-header");
    const panel = card.querySelector(".historial");

    header.onclick = () => {
      document.querySelectorAll(".cliente.abierto").forEach(o => {
        if (o !== card) {
          o.classList.remove("abierto");
          o.querySelector(".historial")?.classList.remove("abierto");
        }
      });

      const abierto = card.classList.toggle("abierto");
      panel.classList.toggle("abierto");
      header.setAttribute("aria-expanded", abierto);
    };

    listaHistorial.appendChild(card);
  });
}

/* ================= FILTRO ================= */
function filtrar() {
  const q = busqueda.value.toLowerCase();
  render(clientes.filter(c =>
    c.nombre.toLowerCase().includes(q)
  ));
}
</script>

</body>
</html>
