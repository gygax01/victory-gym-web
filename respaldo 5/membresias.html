<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Membresías</title>
<link rel="stylesheet" href="css/styles.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@media (max-width: 768px) {
  .header-brand {
    flex-direction: column;
    gap: 14px;
    padding: 18px;
    text-align: center;
  }

  .brand {
    flex-direction: column;
    gap: 8px;
  }

  .brand img {
    height: 70px;
  }

  .brand h2 {
    font-size: 20px;
  }

  header button {
    width: 100%;
    margin-left: 0;
  }

  .search-bar {
    width: 92%;
  }

  .search-bar input {
    height: 46px;
    font-size: 15px;
  }

  .historial-container {
    width: 94%;
  }

  .cliente {
    padding: 16px;
  }

  .cliente h3 {
    font-size: 20px;
  }

  .meta {
    font-size: 13px;
  }

  .flecha {
    font-size: 20px;
  }

  .membresia-grid {
    grid-template-columns: 1fr;
  }

  .pago-row {
    grid-template-columns: 1fr;
  }
}

.membresia-panel {
  padding-top: 12px;
}

.membresia-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding-top: 14px;
  border-top: 1px solid rgba(243, 114, 44, 0.25);
}

.membresia-btn {
  margin: 0;
  background: #3f4147;
}

.membresia-btn:hover {
  background: #4a4d55;
}

.membresia-btn.activo {
  background: #f3722c;
  color: #fff;
  box-shadow: 0 0 0 2px rgba(243, 114, 44, .4);
}

.monto-resumen {
  margin-top: 10px;
  border: 1px solid rgba(46, 204, 113, .32);
  background: rgba(46, 204, 113, .12);
  border-radius: 10px;
  padding: 10px 12px;
  text-align: center;
  color: #d8ffe7;
  font-weight: 600;
}

.monto-resumen .total-valor {
  color: #2ecc71;
  font-size: 23px;
  margin-left: 6px;
}

.pago-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 10px;
}

.pago-row input {
  margin: 0;
  height: 44px;
  text-align: center;
  font-weight: 600;
}

.cambio-valor {
  margin: 0;
  min-height: 44px;
  border: 1px solid rgba(255, 255, 255, .12);
  border-radius: 10px;
  background: #2f3238;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: #d5d9df;
}

.btn-confirmar {
  margin-top: 10px;
  width: 100%;
  background: #2ecc71;
  font-weight: 700;
}

.btn-confirmar:disabled {
  opacity: .55;
  cursor: not-allowed;
  transform: none;
}

.btn-confirmar:disabled:hover {
  background: #2ecc71;
  transform: none;
  box-shadow: none;
}
</style>
</head>

<body>

<header class="header-brand">
  <div class="brand">
    <img src="img/logo.png" alt="Victory Pro Fitness">
    <h2>Membresías</h2>
  </div>
  <button onclick="location.href='index.html'">← Inicio</button>
</header>

<div class="search-bar">
  <input id="busqueda" placeholder="Buscar cliente...">
</div>

<div class="historial-container" id="listaMembresias"></div>

<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/config.js"></script>
<script src="js/ui.js"></script>
<script src="js/ingresos.js"></script>
<script src="js/realtime.js"></script>

<script>
const listaMembresias = document.getElementById("listaMembresias");
const busqueda = document.getElementById("busqueda");

const PRECIO_MENSUALIDAD =
  typeof getPrecioMembresiaMensual === "function" ? getPrecioMembresiaMensual() : 399;
const DIAS_POR_MES = window.APP_CONFIG?.membresias?.diasPorMes || 30;

let clientesBase = [];

window.addEventListener("load", initMembresias);

async function initMembresias() {
  busqueda.addEventListener("input", filtrarClientes);

  await sincronizarDesdeSupabase();
  cargarMembresias();
  activarSyncLocal();

  if (navigator.onLine && typeof iniciarRealtime === "function") {
    iniciarRealtime();
  }
}

async function sincronizarDesdeSupabase() {
  if (!navigator.onLine || !window.supabaseClient) return;

  const { data, error } = await supabaseClient
    .from("clientes")
    .select("*")
    .order("created_at", { ascending: true });

  if (error) {
    console.error("Error cargando clientes:", error);
    return;
  }

  const clientesNormalizados = (data || []).map(c => ({
    id: c.id,
    nombre: c.nombre ?? "",
    tarjetaUID: normalizarUidLocal(c.tarjeta_uid ?? c.tarjetaUID ?? ""),
    fechaRegistro: c.fecha_registro ?? c.fechaRegistro ?? "",
    membresiaExpira: c.membresia_expira ?? c.membresiaExpira ?? "",
    telefono: c.telefono ?? "0",
    peso: c.peso ?? 0,
    altura: c.altura ?? 0
  }));

  safeSet("clientes", clientesNormalizados);
}

function normalizarUidLocal(uid) {
  if (typeof normalizarUID === "function") {
    return normalizarUID(uid);
  }
  return String(uid ?? "").trim().toUpperCase();
}

function normalizarTexto(texto) {
  return String(texto ?? "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase();
}

function escapeHTML(valor) {
  return String(valor ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function fmtMoney(n) {
  return `$${(Number(n) || 0).toFixed(2)}`;
}

function normalizarClienteMembresia(c) {
  return {
    id: c.id ?? null,
    nombre: c.nombre ?? "",
    membresiaExpira: c.membresiaExpira ?? c.membresia_expira ?? "-"
  };
}

function cargarMembresias() {
  clientesBase = (safeGet("clientes") || [])
    .filter(c => c && typeof c.nombre === "string")
    .map(normalizarClienteMembresia)
    .sort((a, b) =>
      a.nombre.localeCompare(b.nombre, "es", { sensitivity: "base" })
    );

  filtrarClientes();
}

function filtrarClientes() {
  const q = normalizarTexto(busqueda.value);
  const filtrados = clientesBase.filter(c =>
    normalizarTexto(c.nombre).includes(q)
  );
  renderMembresias(filtrados);
}

function renderMembresias(lista) {
  listaMembresias.innerHTML = "";

  if (!lista.length) {
    listaMembresias.textContent = "No hay clientes registrados";
    return;
  }

  lista.forEach(cliente => {
    const nombre = escapeHTML(cliente.nombre);
    const expira = escapeHTML(cliente.membresiaExpira || "-");

    const card = document.createElement("div");
    card.className = "cliente";

    card.innerHTML = `
      <div class="cliente-header" aria-expanded="false">
        <div class="info-wrapper">
          <div class="info-bloque">
            <h3>${nombre}</h3>
            <div class="meta">
              <span class="racha actual">Expira: ${expira}</span>
            </div>
          </div>
        </div>
        <div class="flecha">▾</div>
      </div>

      <div class="historial membresia-panel">
        <div class="membresia-grid">
          <button type="button" class="membresia-btn btn-plan" data-meses="1">1 mes</button>
          <button type="button" class="membresia-btn btn-plan" data-meses="2">2 meses</button>
          <button type="button" class="membresia-btn btn-plan" data-meses="3">3 meses</button>
        </div>

        <div class="monto-resumen">
          Total a pagar: <span class="total-valor">$0.00</span>
        </div>

        <div class="pago-row">
          <input
            type="number"
            class="pago-con"
            min="0"
            step="0.01"
            inputmode="decimal"
            placeholder="Pago con"
          >
          <div class="cambio-valor">Cambio: $0.00</div>
        </div>

        <button type="button" class="membresia-btn btn-confirmar" disabled>
          Confirmar pago
        </button>
      </div>
    `;

    const header = card.querySelector(".cliente-header");
    const panel = card.querySelector(".historial");
    const botonesPlan = Array.from(card.querySelectorAll(".btn-plan"));
    const totalValor = card.querySelector(".total-valor");
    const inputPago = card.querySelector(".pago-con");
    const cambioValor = card.querySelector(".cambio-valor");
    const btnConfirmar = card.querySelector(".btn-confirmar");

    let mesesSeleccionados = 0;
    let totalSeleccionado = 0;
    let pagoSeleccionado = 0;
    let cambioSeleccionado = 0;

    header.addEventListener("click", () => {
      document.querySelectorAll(".cliente.abierto").forEach(actual => {
        if (actual !== card) {
          actual.classList.remove("abierto");
          actual.querySelector(".historial")?.classList.remove("abierto");
          actual.querySelector(".cliente-header")?.setAttribute("aria-expanded", "false");
        }
      });

      const abierto = card.classList.toggle("abierto");
      panel.classList.toggle("abierto");
      header.setAttribute("aria-expanded", abierto ? "true" : "false");
    });

    botonesPlan.forEach(btn => {
      btn.addEventListener("click", () => {
        const meses = Number(btn.dataset.meses || 0);
        if (!meses) return;

        mesesSeleccionados = meses;
        totalSeleccionado = mesesSeleccionados * PRECIO_MENSUALIDAD;

        botonesPlan.forEach(b => {
          b.classList.toggle("activo", b === btn);
        });

        totalValor.textContent = fmtMoney(totalSeleccionado);
        inputPago.value = totalSeleccionado.toFixed(2);
        actualizarPagoSeleccionado();
      });
    });

    inputPago.addEventListener("input", () => {
      actualizarPagoSeleccionado();
    });

    function actualizarPagoSeleccionado() {
      if (!mesesSeleccionados || !totalSeleccionado) {
        btnConfirmar.disabled = true;
        btnConfirmar.textContent = "Confirmar pago";
        cambioValor.textContent = "Cambio: $0.00";
        cambioValor.style.color = "#d5d9df";
        pagoSeleccionado = 0;
        cambioSeleccionado = 0;
        return;
      }

      const pago = Number(inputPago.value);
      pagoSeleccionado = Number.isFinite(pago) ? pago : 0;
      const diferencia = Number((pagoSeleccionado - totalSeleccionado).toFixed(2));
      cambioSeleccionado = diferencia > 0 ? diferencia : 0;

      if (diferencia < 0) {
        cambioValor.textContent = `Falta: ${fmtMoney(Math.abs(diferencia))}`;
        cambioValor.style.color = "#ff8e8e";
        btnConfirmar.disabled = true;
        btnConfirmar.textContent = `Falta ${fmtMoney(Math.abs(diferencia))}`;
        return;
      }

      cambioValor.textContent = `Cambio: ${fmtMoney(cambioSeleccionado)}`;
      cambioValor.style.color = "#2ecc71";
      btnConfirmar.disabled = false;
      btnConfirmar.textContent = `Confirmar pago (${fmtMoney(totalSeleccionado)})`;
    }

    btnConfirmar.addEventListener("click", async () => {
      if (!mesesSeleccionados || !totalSeleccionado) {
        await appAlert("Seleccione un plan antes de confirmar", "Membresía");
        return;
      }

      if (!Number.isFinite(pagoSeleccionado) || pagoSeleccionado < totalSeleccionado) {
        await appAlert("El pago no cubre el total de la membresía.", "Pago insuficiente");
        return;
      }

      const etiquetaMeses = mesesSeleccionados === 1 ? "mes" : "meses";
      const confirmar = await appConfirm(
        `Confirmar pago de ${mesesSeleccionados} ${etiquetaMeses}.\nTotal: ${fmtMoney(totalSeleccionado)}\nPago: ${fmtMoney(pagoSeleccionado)}\nCambio: ${fmtMoney(cambioSeleccionado)}`,
        "Confirmar pago"
      );

      if (!confirmar) return;

      btnConfirmar.disabled = true;
      btnConfirmar.textContent = "Aplicando...";

      const ok = await extenderMembresia(
        cliente,
        mesesSeleccionados,
        totalSeleccionado,
        pagoSeleccionado,
        cambioSeleccionado
      );

      if (!ok) {
        actualizarPagoSeleccionado();
      }
    });

    listaMembresias.appendChild(card);
  });
}

async function extenderMembresia(cliente, meses, total, pago, cambio) {
  if (!cliente?.id) {
    await appAlert("Cliente sin ID válido", "Membresía");
    return false;
  }

  if (!navigator.onLine || !window.supabaseClient) {
    await appAlert("Sin conexión a internet", "Membresía");
    return false;
  }

  const dias = Number(meses) * DIAS_POR_MES;
  if (!dias) {
    await appAlert("Plan de membresía inválido", "Membresía");
    return false;
  }

  const { data, error: fetchError } = await supabaseClient
    .from("clientes")
    .select("membresia_expira")
    .eq("id", cliente.id)
    .single();

  if (fetchError) {
    console.error("Error obteniendo cliente:", fetchError);
    await appAlert("No se pudo leer la fecha actual de membresía", "Membresía");
    return false;
  }

  const hoyLocal = new Date();
  hoyLocal.setHours(0, 0, 0, 0);

  const base = data.membresia_expira
    ? new Date(data.membresia_expira + "T00:00:00")
    : new Date(hoyLocal);

  if (base < hoyLocal) {
    base.setTime(hoyLocal.getTime());
  }

  base.setDate(base.getDate() + dias);
  const nuevaFecha = fechaDesdeTS(base.getTime());

  const { error } = await supabaseClient
    .from("clientes")
    .update({ membresia_expira: nuevaFecha })
    .eq("id", cliente.id);

  if (error) {
    console.error("Error actualizando membresia:", error);
    await appAlert("No se pudo actualizar la membresía", "Membresía");
    return false;
  }

  const ventaOk = await registrarVentaSuscripcionRenovada(cliente, meses, total, pago, cambio);

  await sincronizarDesdeSupabase();
  cargarMembresias();
  new BroadcastChannel("victory-data").postMessage("clientes");

  if (!ventaOk) {
    await appAlert(
      "Membresía actualizada, pero la venta quedó pendiente de sincronización",
      "Membresía"
    );
    return true;
  }

  appToast(
    `Membresía actualizada hasta ${nuevaFecha}. Total: ${fmtMoney(total)} | Pago: ${fmtMoney(pago)} | Cambio: ${fmtMoney(cambio)}`,
    "success"
  );
  return true;
}

async function registrarVentaSuscripcionRenovada(cliente, meses, total, pago, cambio) {
  if (typeof registrarSuscripcionIngreso !== "function") return false;
  return registrarSuscripcionIngreso({
    cliente,
    meses,
    total,
    pago,
    cambio,
    renovacion: true,
    referenciaBase: window.APP_CONFIG?.referencias?.suscripcionRenovacion
  });
}

function activarSyncLocal() {
  const bc = new BroadcastChannel("victory-data");

  bc.onmessage = async e => {
    if (e.data === "clientes") {
      await sincronizarDesdeSupabase();
      cargarMembresias();
    }
  };

  window.addEventListener("storage", async e => {
    if (e.key === "clientes") {
      await sincronizarDesdeSupabase();
      cargarMembresias();
    }
  });

  window.addEventListener("online", async () => {
    await sincronizarDesdeSupabase();
    cargarMembresias();
  });
}
</script>

</body>
</html>
